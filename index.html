<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi reina Issa</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a0033, #000); overflow: hidden; height: 100vh; font-family: 'Arial', sans-serif; color: white; }
        .star { position: absolute; font-size: 13px; font-weight: bold; text-shadow: 0 0 10px #fff; animation: float 5s infinite ease-in-out; white-space: nowrap; z-index: 20; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; } 50% { transform: translateY(-20px) scale(1.1); opacity: 1; } }
        .sun { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 110px; height: 110px; background: black; border-radius: 50%; box-shadow: 0 0 60px #ff00ff; z-index: 100; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 16px; font-weight: bold; border: 2px solid #ff00ff; }
        .main-love { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); font-size: 18px; color: #ff69b4; text-shadow: 0 0 20px #ff1493; font-weight: bold; text-align: center; width: 90%; z-index: 100; }
        .c1 { color: #ffb7ff; } .c2 { color: #00ffff; } .c3 { color: #ffffa1; }
    </style>
</head>
<body>
    <div class="sun">ISSA<br>JINETE</div>
    <div class="main-love">EN MI CORAZÓN LLEVO MARCADO TU NOMBRE ✨<br>¡TE AMO DEMASIADO MI CHIQUITA! ❤️</div>

    <div class="star c1" style="top: 5%; left: 10%;">Eres hermosa mi amor</div>
    <div class="star c2" style="top: 15%; left: 60%;">Eres la mejor mujer del mundo</div>
    <div class="star c3" style="top: 25%; left: 80%;">Eres asombrosa</div>
    <div class="star c1" style="top: 35%; left: 15%;">Adorable</div>
    <div class="star c2" style="top: 45%; left: 70%;">Dulce</div>
    <div class="star c3" style="top: 55%; left: 10%;">Muy buena conmigo</div>
    <div class="star c1" style="top: 65%; left: 40%;">Me encantas</div>
    <div class="star c2" style="top: 75%; left: 75%;">Eres hermosa</div>
    <div class="star c3" style="top: 85%; left: 20%;">Te amo demasiado</div>
    <div class="star c1" style="top: 90%; left: 55%;">Mi chiquita linda</div>
    <div class="star c2" style="top: 10%; left: 40%;">Eres mi vida</div>

    <script>
        document.querySelectorAll('.star').forEach(s => {
            s.style.animationDelay = Math.random() * 5 + 's';
        });
    </script>
</body>
</html>
